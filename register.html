<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - PERSONA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="flex items-center justify-center min-h-screen bg-gray-50">

    <div class="w-full max-w-md p-8 bg-white rounded-3xl shadow-xl">
        <div class="text-center mb-8">
            <a href="index.html">
                <img src="logo.png" alt="PERSONA Logo" class="h-12 w-auto mx-auto mb-4">
            </a>
            <h2 class="text-3xl font-bold text-persona-blue mb-2">Create Your Account</h2>
            <p class="text-gray-500">Sign up to start your Forex investment journey.</p>
        </div>

        <div class="space-y-4">
            <input type="text" id="regName" placeholder="Full Name" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-persona-blue">
            <input type="email" id="regEmail" placeholder="Email" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-persona-blue">
            <input type="password" id="regPassword" placeholder="Password" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-persona-blue">
            <button onclick="registerUser()" class="w-full py-3 bg-persona-gold text-blue-900 font-bold rounded-xl hover:shadow-lg transition">Register</button>
        </div>

        <p class="text-center text-gray-500 mt-6">
            Already have an account? <a href="login.html" class="text-persona-blue font-semibold hover:underline">Login here</a>
        </p>
    </div>

    <script>
        function registerUser() {
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;

            if(name === "" || email === "" || password === "") {
                alert("Please fill all fields.");
                return;
            }

            alert(`Account created for ${name}`);
            window.location.href = "dashboard.html";
        }
    </script>

</body>
</html>
