<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deposit - PERSONA</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">

    <!-- Navigation -->
    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto px-6 py-3 flex justify-between items-center">
            <div class="flex items-center">
                <a href="index.html">
                    <img src="logo.png" alt="PERSONA Logo" class="h-12 w-auto mr-3">
                </a>
                <a href="index.html" class="text-2xl font-bold text-persona-blue tracking-tight">PERSONA<span class="text-persona-gold">.</span></a>
            </div>
            <div class="flex items-center space-x-4">
                <a href="dashboard.html" class="text-persona-blue font-semibold hover:underline">Dashboard</a>
                <a href="plans.html" class="text-persona-blue font-semibold hover:underline">Plans</a>
            </div>
        </div>
    </nav>

    <!-- Deposit Section -->
    <div class="container mx-auto px-6 py-12 max-w-lg">
        <h1 class="text-3xl font-bold text-persona-blue mb-6">Make a Deposit</h1>
        <p class="text-gray-500 mb-6">Enter the amount you want to invest.</p>

        <div class="bg-white p-8 rounded-2xl shadow-lg space-y-4">
            <input type="number" placeholder="Amount in USD" id="depositAmount" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-persona-blue">
            <select id="paymentMethod" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-persona-blue">
                <option value="" disabled selected>Select Payment Method</option>
                <option value="visa">Visa</option>
                <option value="bitcoin">Bitcoin</option>
                <option value="ethereum">Ethereum</option>
            </select>
            <button onclick="makeDeposit()" class="w-full py-3 bg-persona-gold text-blue-900 font-bold rounded-xl hover:shadow-lg transition">Deposit Now</button>
        </div>
    </div>

    <script>
        function makeDeposit() {
            const amount = document.getElementById('depositAmount').value;
            const method = document.getElementById('paymentMethod').value;

            if(amount === "" || method === "") {
                alert("Please enter amount and select payment method.");
                return;
            }

            alert(`Deposit of $${amount} via ${method} successful!`);
            window.location.href = "dashboard.html";
        }
    </script>

</body>
</html>
