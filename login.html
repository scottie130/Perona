<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PERSONA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="flex items-center justify-center min-h-screen bg-gray-50">

    <div class="w-full max-w-md p-8 bg-white rounded-3xl shadow-xl">
        <div class="text-center mb-8">
            <a href="index.html">
                <img src="logo.png" alt="PERSONA Logo" class="h-12 w-auto mx-auto mb-4">
            </a>
            <h2 class="text-3xl font-bold text-persona-blue mb-2">Login to Your Account</h2>
            <p class="text-gray-500">Enter your credentials to access your dashboard.</p>
        </div>

        <div class="space-y-4">
            <input type="email" id="loginEmail" placeholder="Email" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-persona-blue">
            <input type="password" id="loginPassword" placeholder="Password" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-persona-blue">
            <button onclick="loginUser()" class="w-full py-3 bg-persona-blue text-white font-bold rounded-xl hover:bg-blue-700 transition shadow-lg">Login</button>
        </div>

        <p class="text-center text-gray-500 mt-6">
            Don't have an account? <a href="register.html" class="text-persona-gold font-semibold hover:underline">Register here</a>
        </p>
    </div>

    <script>
        function loginUser() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            if(email === "" || password === "") {
                alert("Please enter both email and password.");
                return;
            }

            alert(`Logged in as ${email}`);
            window.location.href = "dashboard.html";
        }
    </script>

</body>
</html>
